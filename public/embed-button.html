<!DOCTYPE html>
<html lang="en" style="margin: 0; padding: 0; width: 100%; height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launch Talko</title>
</head>
<body style="margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f0fdfa;">
    
    <a id="launchBtn" href="https://talko-temp.vercel.app/" target="_blank" style="display: block; width: 100%; height: 100%; text-decoration: none; cursor: pointer;">
        <img src="https://commondatastorage.googleapis.com/codeskulptor-assets/lathrop/asteroid_blue.png" 
             alt="Click to open Talko" 
             style="width: 100%; height: 100%; object-fit: contain; padding: 10px; box-sizing: border-box;">
    </a>

    <script>
        document.getElementById('launchBtn').addEventListener('click', function(e) {
            // 1. Detect if the user is on an iPhone or iPad
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            if (isIOS) {
                e.preventDefault(); // Stop the normal link behavior
                
                // 2. The iOS Hack: Use the x-safari-https:// scheme to break out of the Heartbeat app
                window.location.href = "x-safari-https://talko-temp.vercel.app/";
            }
        });
    </script>
</body>
</html>
